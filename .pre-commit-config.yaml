# pre-commit config pra rodar checks locais antes de commitar.
# instala assim: pip install pre-commit && pre-commit install
# roda automatico em git commit.
#
# desabilitado? usar git commit --no-verify (porem o ideal eh fixar o erro)

repos:
  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest rapido
        entry: .venv/bin/pytest -q --tb=no
        language: system
        pass_filenames: false
        types: [python]

      - id: check-json-dicts
        name: valida json dos dicts
        entry: .venv/bin/python -c "import json, sys, pathlib; [json.loads(p.read_text('utf-8')) for p in pathlib.Path('src/dicts').glob('*.json')]; print('dicts ok')"
        language: system
        pass_filenames: false
        files: ^src/dicts/.*\.json$

      - id: ruff-check
        name: ruff lint
        entry: .venv/bin/python -m ruff check src/ tests/
        language: system
        pass_filenames: false
        types: [python]
